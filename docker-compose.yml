version: '3.8'

services:
  app:
    build: .
    container_name: osticket-app
    ports:
      - "8080:80"
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - ./include/ost-config.php:/var/www/html/include/ost-config.php

  db:
    image: mariadb:10.11
    container_name: osticket-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: osticket
      MARIADB_USER: osticketuser
      MARIADB_PASSWORD: strongpassword
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: